<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset your __APP_NAME__ password</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 24px;
            background: #eef2ff;
            color: #111827;
            font-family: Arial, Helvetica, sans-serif;
        "
    >
        <div style="display: none; max-height: 0; overflow: hidden; opacity: 0">
            Reset your __APP_NAME__ password.
        </div>
        <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="100%"
            style="max-width: 640px; margin: 0 auto"
        >
            <tr>
                <td
                    style="
                        padding: 32px;
                        border-radius: 24px;
                        background: #ffffff;
                        box-shadow: 0 18px 60px rgba(38, 67, 210, 0.12);
                    "
                >
                    <div
                        style="
                            display: inline-block;
                            margin-bottom: 20px;
                            padding: 8px 12px;
                            border-radius: 999px;
                            background: rgba(38, 67, 210, 0.08);
                            color: __PRIMARY_COLOR__;
                            font-size: 12px;
                            font-weight: 700;
                            letter-spacing: 0.08em;
                            text-transform: uppercase;
                        "
                    >
                        __APP_NAME__
                    </div>
                    <h1 style="margin: 0 0 12px; font-size: 30px; line-height: 1.15">
                        Reset your password
                    </h1>
                    <p style="margin: 0 0 18px; font-size: 16px; line-height: 1.65; color: #374151">
                        Use the secure link below to choose a new password for your __APP_NAME__
                        account.
                    </p>
                    <p style="margin: 0 0 24px">
                        <a
                            href="{{ .ConfirmationURL }}"
                            style="
                                display: inline-block;
                                padding: 14px 22px;
                                border-radius: 14px;
                                background: __PRIMARY_COLOR__;
                                color: #ffffff;
                                font-size: 15px;
                                font-weight: 700;
                                text-decoration: none;
                            "
                            >Reset password</a
                        >
                    </p>
                    <p style="margin: 0; font-size: 14px; line-height: 1.65; color: #6b7280">
                        If you did not request this, you can ignore this email.
                    </p>
                </td>
            </tr>
        </table>
    </body>
</html>
