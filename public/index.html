<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rallimäng</title>
    <!-- Stiilide viide -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Mängu kanvas -->
    <canvas id="gameCanvas"></canvas>
    <div id="objectivePanel" aria-label="Korje eesmärk">
        <div id="objectiveTitle">KORJE EESMÄRK</div>
        <div id="objectiveRow">
            <span id="objectiveLabel">Kogu:</span>
            <span id="targetColorSwatch" aria-hidden="true"></span>
            <span id="targetColorName">-</span>
        </div>
        <div id="objectiveStatus">Kogu energiasfääre enne kui need kaovad</div>
    </div>
    <div id="botPanel" aria-label="AI botid">
        <div id="botTitle">AI KORJE</div>
        <div id="botList"></div>
    </div>
    <div id="minimap" aria-label="Minikaart">
        <div id="minimapTitle">KAART</div>
        <canvas id="minimapCanvas" width="190" height="190"></canvas>
        <div id="minimapInfo">X 0 | Z 0</div>
    </div>
    <div id="finalLeaderboard" aria-label="Lõpp-edetabel" aria-live="polite" hidden>
        <div class="leaderboardCard">
            <div id="leaderboardTitle">MÄNG LÕPPES</div>
            <div id="leaderboardSummary"></div>
            <div id="leaderboardList"></div>
            <button id="leaderboardRestartBtn" type="button">UUS MÄNG</button>
        </div>
    </div>

    <!-- Põhiloogika -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
