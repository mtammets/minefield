<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Drift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Stiilide viide -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Mängu kanvas -->
    <canvas id="gameCanvas"></canvas>
    <div id="welcomeModal" aria-label="Tervitusvaade" aria-live="polite">
        <div class="welcomeFxGrid" aria-hidden="true"></div>
        <div class="welcomeFxGlow" aria-hidden="true"></div>
        <div class="welcomeCard">
            <div class="welcomeKicker">WELCOME TO</div>
            <h1 id="welcomeGameName">SILENT DRIFT</h1>
            <div id="welcomeTagline">Your ultimate race game</div>
            <div class="welcomeMetaRow" aria-hidden="true">
                <span class="welcomePill">3D LINN</span>
                <span class="welcomePill">360° AUTO</span>
                <span class="welcomePill">AI VASTASED</span>
            </div>
            <div id="welcomePreviewShell">
                <div class="welcomePreviewLabel">SÕIDUKI EELVAADE</div>
                <canvas
                    id="welcomeCarCanvas"
                    width="560"
                    height="300"
                    aria-label="Sinu auto 360 kraadi eelvaates"
                ></canvas>
                <div class="welcomePreviewSweep" aria-hidden="true"></div>
            </div>
            <button id="welcomeStartBtn" type="button">ALUSTA MÄNGU <span aria-hidden="true">→</span></button>
            <div id="welcomeHint">Võid alustada ka Enter klahviga</div>
        </div>
    </div>
    <div id="objectivePanel" aria-label="Korje eesmärk">
        <div id="objectiveTitle">KORJE EESMÄRK</div>
        <div id="objectiveRow">
            <span id="objectiveLabel">Kogu:</span>
            <span id="targetColorSwatch" aria-hidden="true"></span>
            <span id="targetColorName">-</span>
        </div>
        <div id="objectiveStatus">Kogu energiasfääre enne kui need kaovad</div>
    </div>
    <div id="botPanel" aria-label="AI botid">
        <div id="botTitle">AI KORJE</div>
        <div id="botList"></div>
    </div>
    <div id="minimap" aria-label="Minikaart">
        <div id="minimapTitle">KAART</div>
        <canvas id="minimapCanvas" width="190" height="190"></canvas>
        <div id="minimapInfo">X 0 | Z 0</div>
    </div>
    <div id="finalLeaderboard" aria-label="Lõpp-edetabel" aria-live="polite" hidden>
        <div class="leaderboardCard">
            <div id="leaderboardTitle">MÄNG LÕPPES</div>
            <div id="leaderboardSummary"></div>
            <div id="leaderboardList"></div>
            <button id="leaderboardRestartBtn" type="button">UUS MÄNG</button>
        </div>
    </div>
    <div id="pauseModal" aria-label="Pausimenüü" aria-live="polite" hidden>
        <div class="pauseCard">
            <div id="pauseTitle">PAUS</div>
            <div class="pauseActions">
                <button id="pauseExitBtn" class="pauseBtn exit" type="button">EXIT</button>
                <button id="pauseResumeBtn" class="pauseBtn resume" type="button">RESUME</button>
            </div>
        </div>
    </div>

    <!-- Põhiloogika -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
